# nginx config for the Kalypsis SPA. The proxied /api block resolves the API
# service name from the docker-compose network ("api" by default). Override
# API_HOST/API_PORT via Coolify env vars if your topology differs.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compress text payloads aggressively — fonts/icons can be huge.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss application/wasm
               image/svg+xml font/ttf font/woff font/woff2;

    # Long-cache the immutable hashed bundles emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # /api → backend container (resolved by docker-compose). Multipart uploads
    # for contract PDFs need the larger client_max_body_size below.
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 60m;
    }

    # SPA fallback — every non-asset request returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
