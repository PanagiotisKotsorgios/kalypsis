# =============================================================================
# Kalypsis — production docker-compose for Coolify v4.x and any other Docker
# Compose host. Three services: MySQL, the .NET API, and the nginx-served SPA.
#
# In Coolify:
#   1. New Resource → Applications → Public Repository (or Private Repo)
#   2. Build Pack: Docker Compose. Compose file: docker-compose.yml
#   3. Fill in secrets in the Environment Variables panel — see .env.example
#   4. Hit Deploy. The web service is the only one exposed publicly.
#
# Volume naming:
#   The MySQL volume is suffixed with `_v2`. If you ever hit a poisoned MySQL
#   data dir (mysql.user table missing after a crashed first boot), bump it to
#   `_v3` and redeploy — Compose will create a fresh empty volume and MySQL
#   will run its first-boot init cleanly. The old volume becomes orphaned
#   (Coolify shows it under Storages; safe to ignore until cleanup).
# =============================================================================

services:
  mysql:
    # Pinned to MySQL 8.0 — the LTS line that Pomelo/MySqlConnector is most
    # thoroughly tested against. 8.4 dropped several flags Pomelo's drivers
    # still emit; 8.0 avoids the whole class of "unknown variable" boot loops.
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_NAME:-kalypsis}
      MYSQL_USER:          ${DB_USER:-kalypsis}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-changeMeInCoolify}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeMeInCoolify_root}
      # Speeds up first boot — we don't query system timezones.
      MYSQL_INITDB_SKIP_TZINFO: "1"
    volumes:
      - mysql_data_v2:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    # Healthcheck deliberately does NOT depend on the root password — it just
    # checks if mysqld answers a ping on the TCP socket. That way a temporarily
    # wrong password during onboarding doesn't mask a real network failure.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --protocol=tcp -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  api:
    build:
      context: ./src/Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=${DB_NAME:-kalypsis};User=${DB_USER:-kalypsis};Password=${DB_PASSWORD:-changeMeInCoolify};TreatTinyAsBoolean=true;CharSet=utf8mb4;"
      Jwt__Issuer:   ${JWT_ISSUER:-kalypsis}
      Jwt__Audience: ${JWT_AUDIENCE:-kalypsis-clients}
      Jwt__Secret:   ${JWT_SECRET:-REPLACE-WITH-AT-LEAST-32-CHAR-SECRET-FROM-COOLIFY-UI}
      Jwt__AccessTokenMinutes: "60"
      Jwt__RefreshTokenDays:   "30"
      # CORS origin priority:
      #   1) explicit PUBLIC_ORIGIN (set this on local Compose runs), then
      #   2) Coolify auto-injects SERVICE_URL_WEB based on the domain
      #      configured under Domains → Domains for web, then
      #   3) localhost as a safe last-resort default.
      Cors__FrontendOrigin: ${PUBLIC_ORIGIN:-${SERVICE_URL_WEB:-http://localhost}}
      Storage__LocalRoot: /data/uploads
      # ASP.NET DataProtection keyring — encrypts sensitive DB columns (customer
      # ΑΜΚΑ / ταυτότητα / διαβατήριο / δίπλωμα, IBANs, OAuth tokens, IMAP passwords,
      # Twilio credentials). MUST persist across container restarts — losing the
      # volume means losing the ability to decrypt every existing encrypted row.
      # Back up this volume alongside the MySQL data.
      DataProtection__KeyRingPath: /data/keys
      Brevo__ApiKey:       ${BREVO_API_KEY:-}
      Brevo__SenderEmail:  ${BREVO_SENDER_EMAIL:-no-reply@kalypsis.gr}
      Brevo__SenderName:   ${BREVO_SENDER_NAME:-Kalypsis}
    volumes:
      - uploads_data:/data/uploads
      - dp_keys:/data/keys
    # Don't publish 8080 to the host — nginx in the `web` service proxies
    # `/api` over the internal docker network. Comment this back in only for
    # debugging from outside the Compose network.
    # ports:
    #   - "8080:8080"

  web:
    build:
      context: ./src/Frontend/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    # Coolify's built-in reverse-proxy (Traefik/Caddy) already owns the
    # host's port 80/443 and terminates TLS for every app it manages.
    # `expose:` keeps the port reachable on the internal docker network
    # only — the proxy connects to web:80 directly via the network and
    # routes the domain it discovered from SERVICE_FQDN_WEB.
    # Use `ports:` only on bare `docker compose up` outside Coolify.
    expose:
      - "80"

volumes:
  # _v2 cuts the link to the corrupt volume left over from the first failed
  # deploy. Bump to _v3 etc. if you ever need another clean reset.
  mysql_data_v2:
  uploads_data:
  # DataProtection keys — see api.environment.DataProtection__KeyRingPath.
  # NEVER delete this volume unless you're OK with all encrypted columns
  # (customer IDs, IBANs, OAuth tokens) becoming unreadable ciphertext.
  dp_keys:
